<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ▼ 제목/이름만 본인 걸로 바꾸세요 ▼ -->
<title>Kyeongho Park</title>
<meta name="description" content="Design Innovation">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#DDDDD9; --ink:#111110; --muted:#74746D; --line:#C9C9C4; --tint:#E8E8E4;
    --sidebar:240px; --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
    font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}

  /* ───────── 왼쪽 고정 사이드바 ───────── */
  .sidebar{
    position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;
    padding:32px 28px;display:flex;flex-direction:column;
    border-right:1px solid var(--line);background:var(--bg);z-index:20;
  }
  .sidebar .name{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:28px;}
  .sidebar nav{display:flex;flex-direction:column;gap:4px;}
  .sidebar nav a{font-size:15px;color:var(--ink);transition:color .2s;width:fit-content;}
  .sidebar nav a:hover,.sidebar nav a.active{color:var(--muted);}
  .sidebar .foot{margin-top:auto;font-size:12px;color:var(--muted);line-height:1.4;}

  /* ───────── 오른쪽 본문 ───────── */
  main{margin-left:var(--sidebar);padding:0;}

  /* 프로젝트 갤러리 */
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:820px;padding:48px;}
  .item{position:relative;display:block;overflow:hidden;background:var(--tint);aspect-ratio:4/5;}
  .item img{width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .9s var(--ease);}
  .item:hover img{transform:scale(1.03);}
  /* 이미지 없을 때 자리 표시 (이미지 넣으면 가려짐) */
  .item .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#C4C4BE;font-size:15px;letter-spacing:.04em;}
  .item .label{
    position:absolute;left:0;bottom:0;right:0;padding:20px 22px;
    display:flex;justify-content:space-between;align-items:baseline;
    color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.55));
    opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s var(--ease);
  }
  .item:hover .label{opacity:1;transform:none;}
  .item .label .t{font-size:16px;font-weight:600;}
  .item .label .y{font-size:13px;opacity:.8;}

  /* 스크롤 등장 */
  .reveal{opacity:0;transform:translateY(20px);
    transition:opacity .8s var(--ease),transform .8s var(--ease);}
  .reveal.in{opacity:1;transform:none;}

  /* ───────── 모바일: 사이드바를 상단 바로 ───────── */
  @media (max-width:760px){
    .sidebar{position:static;width:auto;height:auto;flex-direction:row;
      align-items:center;justify-content:space-between;padding:18px 20px;}
    .sidebar .name{margin-bottom:0;font-size:18px;}
    .sidebar nav{flex-direction:row;gap:16px;}
    .sidebar .foot{display:none;}
    main{margin-left:0;}
    .gallery{grid-template-columns:1fr;padding:20px;gap:16px;}
    .item{aspect-ratio:4/3;}
    .item .label{opacity:1;transform:none;}
  }

  a:focus-visible{outline:2px solid var(--ink);outline-offset:-2px;}
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;}
    .reveal{opacity:1!important;transform:none!important;}
  }
</style>
</head>
<body>

  <!-- 왼쪽 사이드바 (모든 페이지 공통) -->
  <aside class="sidebar">
    <a href="index.html" class="name">Kyeongho Park</a>
    <nav>
      <a href="index.html" class="active">Projects</a>
      <a href="information.html">Information</a>
    </nav>
    <div class="foot">© 2026 이름<br>Portfolio</div>
  </aside>

  <main>
    <!--
      ▼ 프로젝트 하나를 추가하려면 <a class="item">...</a> 블록을 복사해서
        href(연결할 상세 페이지), 제목, 연도, 이미지만 바꾸세요.
        이미지 넣기: .ph 줄을 지우고 <img> 주석을 풀어 src를 바꾸면 돼요.
    -->
    <div class="gallery">

      <a href="project.html" class="item reveal">
        <img src="images/Doorbell.webp" alt="Doorbell">
        <span class="label"><span class="t">The bell</span><span class="y">2026</span></span>
      </a>

      <a href="project.html" class="item reveal">
        <img src="images/Beyondtheglass.webp" alt="Beyond the glass">
        <span class="label"><span class="t">Beyond the glass</span><span class="y">2026</span></span>
      </a>

      <a href="project.html" class="item reveal">
        <span class="ph">Project 03</span>
        <!-- <img src="images/p3-cover.jpg" alt="프로젝트 3"> -->
        <span class="label"><span class="t">프로젝트 제목 03</span><span class="y">2024</span></span>
      </a>

      <a href="project.html" class="item reveal">
        <span class="ph">Project 04</span>
        <!-- <img src="images/p4-cover.jpg" alt="프로젝트 4"> -->
        <span class="label"><span class="t">프로젝트 제목 04</span><span class="y">2024</span></span>
      </a>

    </div>
  </main>

  <script>
    const io=new IntersectionObserver((es)=>{es.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}
    });},{threshold:.15});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  </script>
</body>
</html>
